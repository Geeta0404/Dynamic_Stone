<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark stone background circle -->
  <circle cx="16" cy="16" r="16" fill="#211c17"/>

  <!-- Terrazzo specks — terracotta tones -->
  <circle cx="8"  cy="9"  r="1.8" fill="#c4744a"/>
  <circle cx="22" cy="13" r="1.2" fill="#d4956a"/>
  <circle cx="12" cy="23" r="1.4" fill="#b85e38"/>
  <circle cx="26" cy="20" r="1.0" fill="#c4744a"/>

  <!-- Cream / off-white specks -->
  <circle cx="19" cy="7"  r="1.3" fill="#efeae3"/>
  <circle cx="7"  cy="19" r="1.0" fill="#f0ece4"/>
  <circle cx="25" cy="9"  r="0.9" fill="#efeae3"/>
  <circle cx="23" cy="26" r="1.5" fill="#f0ece4"/>

  <!-- Brass / gold specks -->
  <circle cx="14" cy="14" r="1.1" fill="#c9a050"/>
  <circle cx="20" cy="22" r="0.9" fill="#b8920a"/>

  <!-- Dark grey / charcoal specks -->
  <circle cx="10" cy="15" r="0.8" fill="#4a4240"/>
  <circle cx="18" cy="27" r="0.7" fill="#3a3230"/>
  <circle cx="27" cy="14" r="0.7" fill="#4a4240"/>

  <!-- Subtle terracotta ring -->
  <circle cx="16" cy="16" r="15.2" fill="none" stroke="#c4744a" stroke-width="0.6" opacity="0.45"/>
</svg>
